micronaut:
  application:
    name: tours-service
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        frontend:
          allowed-origins:
            - "http://localhost:3000"
            - "http://127.0.0.1:3000"
            - "http://localhost:5173"
          allowed-methods:
            - GET
            - POST
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Accept

datasources:
  default:
    url: jdbc:h2:mem:toursdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    schema-generate: CREATE_DROP
    dialect: H2

jpa:
  default:
    entity-scan:
      packages: 'com.lanchaTours.tours.model'
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false

logger:
  levels:
    com.lanchaTours: DEBUG
    io.micronaut.data: INFO
