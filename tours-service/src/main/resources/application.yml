micronaut:
  application:
    name: tours-service
  server:
    port: 8081
    cors:
      enabled: true
      configurations:
        frontend:
          # Cualquier puerto en loopback (p. ej. Vite en 3001 si 3000 está ocupado)
          allowed-origins-regex: '^http://(localhost|127\.0\.0\.1|\[::1\])(:\d+)?$'
          allowed-origins:
            - "http://localhost:3000"
            - "http://127.0.0.1:3000"
            - "http://localhost:5173"
            - "http://127.0.0.1:5173"
            - "http://localhost:4173"
            - "http://127.0.0.1:4173"
          allowed-methods:
            - GET
            - POST
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Accept

datasources:
  default:
    url: jdbc:h2:mem:toursdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""

jpa:
  default:
    entity-scan:
      packages: "com.lanchaTours.tours.model"
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
